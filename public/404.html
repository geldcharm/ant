<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect all GitHub Pages 404s to index.html for client-side routing
      var path = window.location.pathname;
      window.location.replace('/ant/' + '?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
